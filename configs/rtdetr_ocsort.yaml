device: auto

detector:
  name: ultralytics
  weights: rtdetr-l.pt
  conf_threshold: 0.22
  iou_threshold: 0.50
  classes: [0]
  imgsz: 1280
  half: true
  verbose: false

tracker:
  name: ocsort
  
  det_thresh: 0.22
  max_age: 50
  min_hits: 3
  iou_threshold: 0.30
  max_iou_distance: 0.7
  per_class: false

input:
  path: demo/sample_videos/mot17_09_frcnn.mp4
  frame_skip: 1
  start_frame: 0
  max_frames: null

output:
  video_path: demo/sample_outputs/output.mp4
  mot_path: demo/sample_outputs/output.mot.txt
  tracks_json_path: demo/sample_outputs/output.tracks.json
  save_video: true
  save_mot: true
  save_tracks_json: true

visualization:
  draw_boxes: true
  draw_labels: true
  draw_track_ids: true
  line_width: 2
  font_scale: 0.5
  trail_length: 30
  show_trajectories: true
  show_scores: true
  show_fps: true

profiling:
  enabled: true
  log_every_n_frames: 25


appearance:
  enabled: true

  # Number of high-confidence observations per track to sample
  sample_count: 5

  # Skip appearance extraction for very small person crops
  min_crop_width: 30
  min_crop_height: 60

  # Keep the center region of the bbox to reduce background contamination
  center_crop_ratio: 0.70

  # KMeans configuration
  kmeans_k: 3

  # If remaining cluster centers are too close in HSV space,
  # treat the clothing as effectively monochrome / uniform
  cluster_distance_threshold: 30.0

  # Final aggregated confidence below this becomes low_confidence=true
  low_confidence_threshold: 0.50

  # Tunable HSV skin filtering bounds
  skin_hue_min: 0
  skin_hue_max: 25
  skin_sat_min: 20
  skin_sat_max: 255
  skin_val_min: 40
  skin_val_max: 255

  # Display color -> retrieval base color mapping
  canonical_color_map:
    navy: blue
    sky_blue: blue
    pink: red
    orange: orange
    brown: brown
    black: black
    white: white
    gray: gray
    red: red
    blue: blue
    green: green
    yellow: yellow